  </div>

  <script>
  (function() {
    const sentinel = document.getElementById('pagination-sentinel');
    const pagination = document.getElementById('pagination');
    if (!sentinel || !pagination) return;
    const observer = new IntersectionObserver(([entry]) => {
      pagination.classList.toggle('pagination--sticky', !entry.isIntersecting);
    }, { threshold: 0 });
    observer.observe(sentinel);
  })();
  </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
window._downloadScale = 3;

function downloadCardImage(cardElement, fileName) {
  const ds = window._downloadState || {};

  const downloadBtn = cardElement.querySelector('.download-btn');
  const faceBtn     = cardElement.querySelector('.download-face-btn');

  if (downloadBtn) downloadBtn.style.display = 'none';
  if (faceBtn)     faceBtn.style.display     = 'none';

  const toHide = [];
  const hide = (sel) => {
    cardElement.querySelectorAll(sel).forEach(el => {
      toHide.push({ el, prev: el.style.display });
      el.style.display = 'none';
    });
  };

  hide('.totwNumber');
  hide('.specialChem');

  if (!ds.showFCM)       hide('.fatal-meta-badge');
  if (!ds.showFatal)     hide('.fatals');
  if (!ds.showAltPos)    hide('.alt-positions');
  if (!ds.showBreakdown) hide('.fcm-breakdown');

  const scale = window._downloadScale || 3;
  const rect  = cardElement.getBoundingClientRect();
  html2canvas(cardElement, { backgroundColor: null, useCORS: true, scale, width: rect.width, height: rect.height })
    .then(canvas => {
      if (downloadBtn) downloadBtn.style.display = '';
      if (faceBtn)     faceBtn.style.display     = '';
      toHide.forEach(({ el, prev }) => { el.style.display = prev; });

      canvas.toBlob(blob => {
        const a   = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
      }, 'image/png');
    });
}
window.downloadCardImage = downloadCardImage;
</script>

<script src="/Template26.js"></script>

<script>
function debugCards() {
  const container = document.getElementById('card-container');
  const html = container?.innerHTML || '';
  
  console.log('card-container child count:', container?.children.length);
  console.log('Has card-and-breakdown:', html.includes('card-and-breakdown'));
  console.log('Has card-three-dots:', html.includes('card-three-dots'));
  console.log('Has card-menu-wrap:', html.includes('card-menu-wrap'));
  console.log('innerHTML preview:', html.substring(0, 1000));
  console.log('toggleCardMenu:', typeof window.toggleCardMenu);
  console.log('openDevMenu:', typeof window.openDevMenu);

  const dots = document.querySelectorAll('.card-three-dots');
  console.log('Dots buttons in DOM:', dots.length);
}

document.getElementById('card-container').addEventListener('DOMNodeInserted', () => {
  const container = document.getElementById('card-container');
  if (container.querySelectorAll('.card').length > 0) {
    console.log('Cards detected in DOM, running debug...');
    debugCards();
  }
}, { once: true });

setTimeout(debugCards, 12000);
</script>
